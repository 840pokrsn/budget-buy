<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel | TechStore</title>
</head>
<body style="margin:0; font-family:sans-serif; background:#f4f4f4;">

    <div style="background:#222; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
        <div style="font-weight:bold; font-size:20px;">Budget buy</div>
        <div style="font-weight:bold; font-size:20px;">Admin</div>
         <div style="display:flex; gap:20px;">
            <div style="cursor:pointer;"><a href="home.html" style="color:white; text-decoration:none;">Home</a></div>
            <div style="cursor:pointer;"><a href="products.html" style="color:white; text-decoration:none;">Products</a></div>
            <div style="cursor:pointer;"><a href="cart.html" style="color:white; text-decoration:none;">Cart (0)</a></div>
        </div>
    </div>
    <div style="border:2px;">
        <form style="max-width:900px; margin:40px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
            <h2 style="text-align:center; margin-bottom:20px;">Admin Login</h2>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="fname" style="width: 48%; padding:10px; border-radius:5px; border:1px solid #ccc;">
                <label for="lname" >Last Name</label>
                <input type="text" id="lname" name="lname" style="width: 48%; padding:10px; border-radius:5px; border:1px solid #ccc; "> 
            </div><br>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" style="width: 48%; padding:10px; border-radius:5px; border:1px solid #ccc;">   
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" style="width: 48%; padding:10px; border-radius:5px; border:1px solid #ccc;">  
            </div><br>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label for="eid">Employee id</label>
                <input type="number" id="eid" name="eid" style="width: 48%; padding:10px; border-radius:5px; border:1px solid #ccc;">
                <label for="dept">Department</label>
                <input type="text" id="dept" name="dept" style="width: 48%; padding:10px; border-radius:5px; border:1px solid #ccc;">
            </div><br>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label for="doj">Date of Joining</label>
                <input type="date" id="doj" name="doj" style="width: 48%; padding:10px; border-radius:5px; border:1px solid #ccc;">  
                <label for="role">Post</label>
                <input type="text" id="role" name="role" style="width: 48%; padding:10px; border-radius:5px; border:1px solid #ccc;">   
            </div><br>
            <div>
                <label for="username" style="display:block; margin-bottom:5px;">Username</label>
                <input type="text" id="username" name="username" style="width: 48%; padding:10px; border-radius:5px; border:1px solid #ccc;">
            </div>
            <div style="margin-bottom:20px;">
                <label for="password" style="display:block; margin-bottom:5px;">Password</label>
                <input type="password" id="password" name="password" style="width: 48%; padding:10px; border-radius:5px; border:1px solid #ccc;">
            </div>
            <div style="text-align:center;">
                <button type="submit" style="background:#007bff; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">Login</button>
            </div>
    </div>
</html>
