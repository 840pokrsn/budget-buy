
<!DOCTYPE html>
<html>
<head>
    <title>Hubs | TechStore</title>
    <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; }
    .header { background: #1a1a1a; color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-weight: 800; font-size: 24px; letter-spacing: 1px; color: #00d4ff; }
    .nav { display: flex; gap: 25px; }
    .nav a { color: #ccc; text-decoration: none; font-size: 14px; font-weight: 600; transition: color 0.3s; }
    .nav a:hover { color: white; }
    .nav a.active { color: #00d4ff; border-bottom: 2px solid #00d4ff; padding-bottom: 2px; }
    .container { padding: 40px; max-width: 1200px; margin: 0 auto; }
    .section-title { font-size: 28px; font-weight: 700; margin-bottom: 30px; text-align: center; position: relative; padding-bottom: 10px; }
    .section-title::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 3px; background: #007bff; }
    .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }
    .card { background: white; width: 280px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s; }
    .card:hover { transform: translateY(-5px); }
    .card img { width: 100%; height: 200px; object-fit: cover; }
    .card-content { padding: 20px; text-align: center; }
    .product-name { font-weight: 700; font-size: 18px; margin-bottom: 8px; color: #222; height: 50px; display: flex; align-items: center; justify-content: center; }
    .price { color: #28a745; font-weight: 800; font-size: 20px; margin-bottom: 15px; }
    .btn { display: inline-block; background: #007bff; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 600; transition: background 0.3s; }
    .btn:hover { background: #0056b3; }
    .footer { text-align: center; padding: 40px; background: #e9ecef; color: #6c757d; margin-top: 60px; border-top: 1px solid #dee2e6; }
    .footer a { color: #007bff; text-decoration: none; }
    .back-btn { margin-bottom: 20px; display: inline-block; color: #007bff; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
    <div class="header">
        <div class="logo">Budget buy</div>
        <div class="nav">
            <a href="home.html">Home</a>
            <a href="products.html" class="active">Products</a>
            <a href="#">Cart (0)</a>
        </div>
    </div>

    <div class="container">
        <a href="products.html" class="back-btn">&larr; Back to Categories</a>
        <div class="section-title">Hubs</div>
        <div class="grid">
            
        <div class="card">
            <img src="https://plus.unsplash.com/premium_photo-1675024226990-36dcb7252c62?w=400&h=300&fit=crop" alt="Smart Home Hub Pro">
            <div class="card-content">
                <div class="product-name">Smart Home Hub Pro</div>
                <div class="price">$199</div>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1563770660941-20978e870e26?w=400&h=300&fit=crop" alt="USB-C 12-in-1 Hub">
            <div class="card-content">
                <div class="product-name">USB-C 12-in-1 Hub</div>
                <div class="price">$89</div>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1543512214-318c7553f230?w=400&h=300&fit=crop" alt="Google Nest Hub 3">
            <div class="card-content">
                <div class="product-name">Google Nest Hub 3</div>
                <div class="price">$129</div>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>
        </div>
    </div>

    <div class="footer">
        <div>&copy; 2026 TechStore | <a href="#">Contact Us</a> | <a href="#">Terms of Service</a></div>
    </div>
</body>
</html>
